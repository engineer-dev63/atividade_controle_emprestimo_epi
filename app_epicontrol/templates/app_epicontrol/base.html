<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gerenciamento de EPI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        /* Estilização Customizada do Menu Lateral */
        .sidebar {
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            background-color: #1e293b;
            padding-top: 25px;
            color: #ffffff;
            z-index: 1000;
        }
        .user-profile img {
            width: 80px;
            height: 80px;
            border: 3px solid #38bdf8;
            object-fit: cover;
        }
        .sidebar-menu a {
            padding: 12px 20px;
            text-decoration: none;
            font-size: 16px;
            color: #94a3b8;
            display: block;
            transition: all 0.3s;
        }
        .sidebar-menu a:hover, .sidebar-menu a.active {
            background-color: #334155;
            color: #38bdf8;
            border-left: 4px solid #38bdf8;
        }
        /* Área de Conteúdo Principal à Direita */
        .main-content {
            margin-left: 260px;
            padding: 40px;
        }
        .card-custom {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-profile text-center mb-4 px-3">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150" class="rounded-circle mb-2" alt="Foto do Usuário">
            <h6 class="mb-0 fw-bold">Eng. Dev 63</h6>
            <small class="text-muted">Administrador</small>
        </div>
        <hr class="mx-3 text-secondary">
        
        <div class="sidebar-menu">
            <a href="colaboradores.html" class="active">Gerenciar Colaboradores</a>
            <a href="equipamentos.html">Gerenciar Equipamentos (EPI)</a>
            <a href="emprestimos.html">Controle de Empréstimos</a>
        </div>
    </div>

    <div class="main-content">
        <div class="container-fluid">
            <div class="alert alert-success alert-dismissible fade show" role="alert">
                <strong>Sucesso!</strong> Operação realizada com êxito para o sistema.
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="card card-custom p-5 text-center bg-white">
                <h2>Selecione uma opção no menu lateral para iniciar</h2>
                <p class="text-muted">Navegue pelas telas de Colaboradores, Equipamentos ou Empréstimo de EPI.</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
